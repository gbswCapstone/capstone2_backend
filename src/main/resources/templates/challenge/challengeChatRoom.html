<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>챌린지 채팅방</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
</head>
<body>
<h1 id="roomTitle">챌린지 채팅방</h1>

<p><strong>방 ID:</strong> <span id="roomIdDisplay"></span></p>
<p><strong>챌린지 ID:</strong> <span id="challengeIdDisplay"></span></p>
<p><strong>현재 사용자:</strong> <span id="currentUser">테스트_유저</span></p>

<hr>

<div id="messages" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px;">
</div>

<form id="messageForm">
  <input type="text" id="messageInput" placeholder="메시지 입력..." required style="width: 80%;">
  <button type="submit">전송</button>
</form>

<hr>

<button onclick="window.history.back()">목록으로 돌아가기</button>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get('roomId');
  const challengeId = urlParams.get('challengeId');
  const currentUser = document.getElementById('currentUser').textContent; // 임시 사용자 이름

  if (!roomId) {
      alert('채팅방 ID가 없습니다.');
      window.history.back();
  }

  document.getElementById('roomIdDisplay').textContent = roomId;
  document.getElementById('challengeIdDisplay').textContent = challengeId;

  let stompClient = null;

  // WebSocket 연결
  function connect() {
      // TODO: 백엔드 WebSocket 엔드포인트에 맞게 수정하세요. (예: /ws/chat)
      const socket = new SockJS('/ws/chat');
      stompClient = Stomp.over(socket);

      stompClient.connect({}, onConnected, onError);
  }

  function onConnected() {
      console.log('WebSocket 연결 성공');

      // 1. 메시지 구독 (받기)
      // TODO: 백엔드 메시지 구독 경로에 맞게 수정하세요. (예: /sub/chat/room/{roomId})
      stompClient.subscribe(`/sub/chat/room/${roomId}`, onMessageReceived);

      // 2. 채팅방 입장 메시지 전송
      // TODO: 메시지 전송 경로에 맞게 수정하세요. (예: /pub/chat/message)
      stompClient.send("/pub/chat/message", {},
          JSON.stringify({
              type: 'ENTER',
              roomId: roomId,
              sender: currentUser,
              message: currentUser + '님이 입장하셨습니다.'
          })
      );
  }

  function onError(error) {
      console.error('WebSocket 연결 실패:', error);
      const messagesDiv = document.getElementById('messages');
      messagesDiv.innerHTML += `<p style="color:red;">WebSocket 연결 실패. 백엔드 설정을 확인하세요.</p>`;
  }

  function onMessageReceived(payload) {
      const message = JSON.parse(payload.body);
      const messagesDiv = document.getElementById('messages');

      let messageText = '';
      if (message.type === 'ENTER' || message.type === 'LEAVE') {
          messageText = `<div style="color: gray;">${message.message}</div>`;
      } else {
          messageText = `<div><strong>${message.sender}</strong>: ${message.message}</div>`;
      }

      messagesDiv.innerHTML += messageText;
      // 스크롤을 항상 아래로
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function sendMessage(event) {
      event.preventDefault();
      const messageInput = document.getElementById('messageInput');
      const messageContent = messageInput.value.trim();

      if (messageContent && stompClient) {
          // 메시지 객체 생성
          const chatMessage = {
              type: 'TALK',
              roomId: roomId,
              sender: currentUser,
              message: messageContent
          };

          // 3. 메시지 전송 (보내기)
          // TODO: 메시지 전송 경로에 맞게 수정하세요.
          stompClient.send("/pub/chat/message", {}, JSON.stringify(chatMessage));
          messageInput.value = '';
      }
  }

  document.getElementById('messageForm').addEventListener('submit', sendMessage);

  connect();
</script>
</body>
</html>
